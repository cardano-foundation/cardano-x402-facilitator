# yaci-store profile (spec sections 9.3 / 12): self-hosted indexing against a
# cardano-node instead of Blockfrost. Activated with
#   --spring.profiles.active=yaci-store   (compose full profile sets this).
# Requires a reachable cardano-node (N2N sync + N2C submit socket) and a Postgres
# carrying the yaci-store schema. NOT runtime-verifiable without those.
spring:
  # Clear the default profile's JPA exclusions so the yaci-store indexer (JPA/Hibernate) runs.
  autoconfigure:
    exclude: []
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
  # yaci-store's schema ships as classpath SQL; run it via Spring Flyway here
  # (the facilitator's own settlement schema keeps its programmatic runner).
  flyway:
    enabled: true
    locations: classpath:db/store/postgresql

# yaci-store sync source + submission socket (see the yaci-store `store.*` metadata).
store:
  cardano:
    host: ${YACI_N2N_HOST:localhost}          # N2N relay to sync from (local node in full mode)
    port: ${YACI_N2N_PORT:3001}
    protocol-magic: ${YACI_PROTOCOL_MAGIC:1}   # 1 = preprod, 764824073 = mainnet, 2 = preview
    n2c-node-socket-path: ${CARDANO_NODE_SOCKET:/ipc/node.socket}
  utxo:
    pruning-enabled: false   # keep spent rows so tri-state UTxO resolution stays correct

x402:
  networks:
    - id: "cardano:preprod"
      required: true
      chain:
        mode: yaci-store
  chain:
    tip-freshness-slots: 600   # within ~600 slots of the network tip => "caught up"
    utxo-unknown-policy: fail   # fail-closed on sync-horizon Unknowns (vs "assume-spent")
