# Cardano x402 facilitator — deployment profiles.
#
#   light: postgres + facilitator (Blockfrost by default; point BLOCKFROST_BASE_URL
#          at a standalone yaci-store's Blockfrost-compatible endpoint to use it).
#   full:  postgres + mithril-sync -> cardano-node + yaci-store (standalone indexer
#          exposing a Blockfrost-compatible API) + facilitator-node.
#
# The facilitator reaches the chain through the Blockfrost provider; a standalone
# yaci-store is consumed the same way, via its Blockfrost-compatible API.
#
# Bring up light:  docker compose --profile light up -d
# Bring up full:   CARDANO_NETWORK=preprod docker compose --profile full up -d
name: cardano-x402-facilitator

services:
  postgres:
    image: postgres:17-alpine
    profiles: [light, full]
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # ---- light profile: blockfrost (or yaci-store against a public relay) --------
  facilitator:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    profiles: [light]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/postgres
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      # Blockfrost provider. Point BLOCKFROST_BASE_URL at hosted Blockfrost (default)
      # or a standalone yaci-store's Blockfrost-compatible endpoint, e.g.
      # http://my-yaci-store:8080/api/v1/blockfrost; project-id is ignored by yaci-store.
      BLOCKFROST_BASE_URL: ${BLOCKFROST_BASE_URL:-https://cardano-preprod.blockfrost.io/api/v0}
      BLOCKFROST_PROJECT_ID: ${BLOCKFROST_PROJECT_ID:-}
      CARDANO_NETWORK: ${CARDANO_NETWORK:-preprod}
    ports:
      - "4022:4022"
    restart: unless-stopped

  # ---- full profile: Mithril bootstrap -> local cardano-node -> yaci-store ------
  mithril-sync:
    build:
      context: ..
      dockerfile: deploy/dockerfiles/mithril/Dockerfile
    profiles: [full]
    environment:
      NETWORK: ${CARDANO_NETWORK:-preprod}
      MITHRIL_SYNC: ${MITHRIL_SYNC:-true}
      # Optional overrides — left blank, the entrypoint fetches the published IOG
      # defaults for the network. Set them to pin/air-gap the trust anchors.
      AGGREGATOR_ENDPOINT: ${AGGREGATOR_ENDPOINT:-}
      GENESIS_VERIFICATION_KEY: ${GENESIS_VERIFICATION_KEY:-}
      ANCILLARY_VERIFICATION_KEY: ${ANCILLARY_VERIFICATION_KEY:-}
    volumes:
      - node-db:/node
    restart: "no" # one-shot: downstream services gate on completion

  cardano-node:
    image: ghcr.io/intersectmbo/cardano-node:${CARDANO_NODE_VERSION:-10.4.1}
    profiles: [full]
    depends_on:
      mithril-sync:
        condition: service_completed_successfully
    environment:
      NETWORK: ${CARDANO_NETWORK:-preprod}
      # `mithril-client cardano-db download --download-dir /node` restores the DB
      # into a `db/` SUBDIRECTORY (/node/db), not the dir root. The node-db volume
      # is mounted at /data here, so that snapshot lives at /data/db — which is
      # exactly where the node's database path points. (Pointing at the volume
      # root instead gives `NoDbMarkerAndNotEmpty`, since the root only holds the
      # `db/` folder plus the mithril marker.)
      CARDANO_DATABASE_PATH: /data/db
      CARDANO_SOCKET_PATH: /ipc/node.socket
    volumes:
      - node-db:/data
      - node-ipc:/ipc
    ports:
      - "${CARDANO_NODE_PORT:-3001}:3001" # N2N relay port (yaci-store sync source)
    healthcheck:
      # Socket present => node is up enough for N2C submission.
      test: ["CMD-SHELL", "test -S /ipc/node.socket"]
      interval: 15s
      timeout: 5s
      retries: 40
      start_period: 120s
    restart: unless-stopped

  # Standalone yaci-store: syncs from the local node (N2N), submits via its N2C
  # socket, and exposes a Blockfrost-compatible API the facilitator consumes.
  # Config uses Spring relaxed-binding env vars — see
  # https://github.com/bloxbean/yaci-store/tree/main/docker for the full reference.
  yaci-store:
    image: bloxbean/yaci-store:${YACI_STORE_VERSION:-2.0.2}
    profiles: [full]
    depends_on:
      postgres:
        condition: service_healthy
      cardano-node:
        condition: service_healthy
    environment:
      STORE_CARDANO_HOST: cardano-node                       # sync source (N2N)
      STORE_CARDANO_PORT: "3001"
      STORE_CARDANO_PROTOCOL_MAGIC: ${YACI_PROTOCOL_MAGIC:-1}
      STORE_CARDANO_N2C_NODE_SOCKET_PATH: /ipc/node.socket   # submission (N2C)
      # Start indexing from a recent intersect (slot + matching blockhash), not genesis.
      STORE_CARDANO_SYNC_START_SLOT: ${SYNC_START_SLOT:-128935504}
      STORE_CARDANO_SYNC_START_BLOCKHASH: ${SYNC_START_BLOCKHASH:-54f6b2f9647ec1f3a1466368b428c3246c05be848c006fe24e53f1b87bb35d6a}
      # Shared Postgres instance, own schema (the facilitator uses the `facilitator` schema).
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/postgres?currentSchema=yaci_store
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-postgres}
      # Expose the Blockfrost-compatible API that facilitator-node reaches via BLOCKFROST_BASE_URL below.
      STORE_EXTENSIONS_BLOCKFROST_ENABLED: "true"
      BLOCKFROST_APIPREFIX: /api/v1/blockfrost
      STORE_PLUGINS_ENABLED: "false"                         # avoids the non-root sandbox mkdir
    volumes:
      - node-ipc:/ipc              # N2C submit socket
      - yaci-store-data:/app/data
    ports:
      - "${YACI_STORE_PORT:-8080}:8080"
    restart: unless-stopped

  facilitator-node:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    profiles: [full]
    depends_on:
      postgres:
        condition: service_healthy
      yaci-store:
        condition: service_started
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/postgres
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      CARDANO_NETWORK: ${CARDANO_NETWORK:-preprod}
      # Consume the standalone yaci-store via its Blockfrost-compatible API — the same
      # blockfrost provider as hosted Blockfrost; project-id is ignored by yaci-store.
      BLOCKFROST_BASE_URL: http://yaci-store:8080/api/v1/blockfrost
      BLOCKFROST_PROJECT_ID: ""
    ports:
      - "4022:4022"
    restart: unless-stopped

volumes:
  pgdata:
  node-db:
  node-ipc:
  yaci-store-data:
